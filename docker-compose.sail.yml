# Local development stack via Laravel Sail.
# Activate by setting `COMPOSE_FILE=docker-compose.sail.yml` in `.env`.
# Production stack lives in docker-compose.yml.
services:
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.4
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.4/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - mailpit
    queue:
        image: sail-8.4/app
        command:
            - php
            - artisan
            - 'queue:work'
            - '--queue=monitors,ssl,notifications,default'
            - '--tries=1'
            - '--sleep=3'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            REVERB_HOST: reverb
            REVERB_PORT: '8080'
            REVERB_SCHEME: http
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
            pgsql:
                condition: service_healthy
        restart: unless-stopped
    reverb:
        image: sail-8.4/app
        command:
            - php
            - artisan
            - 'reverb:start'
            - '--host=0.0.0.0'
            - '--port=8080'
        ports:
            - '${REVERB_PORT:-8080}:8080'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
            pgsql:
                condition: service_healthy
        restart: unless-stopped
    scheduler:
        image: sail-8.4/app
        command:
            - php
            - artisan
            - 'schedule:work'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            REVERB_HOST: reverb
            REVERB_PORT: '8080'
            REVERB_SCHEME: http
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
            pgsql:
                condition: service_healthy
        restart: unless-stopped
    fake-servers:
        image: sail-8.4/app
        command:
            - php
            - artisan
            - 'dev:fake-servers'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            APP_ENV: local
            FAKE_SERVERS_BIND_HOST: 0.0.0.0
        ports:
            - '9001-9020:9001-9020'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            laravel.test:
                condition: service_started
        restart: unless-stopped
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
